name: build

on:
    push:
        branches: [ "main" ]
    pull_request:

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repo
              uses: actions/checkout@v4

            - name: Setup JDK
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 25

            - name: Grant gradlew permission
              run: chmod +x gradlew

            - name: Build plugin
              run: ./gradlew build
              
            - name: Upload final build
              uses: actions/upload-artifact@v4
              with:
                  name: plugin-build-artifacts
                  path: build/libs/
                  if-no-files-found: error
                  retention-days: 5
                  